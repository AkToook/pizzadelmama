<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — New Pizza Reims</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0a0a;--card:#1a1a1a;--border:#2a2a2a;--red:#c0392b;--red-bright:#e74c3c;--green:#27ae60;--green-glow:rgba(39,174,96,.25);--gold:#d4a855;--orange:#f39c12;--white:#f5f5f5;--dim:#888;--font:'Manrope',sans-serif}
body{font-family:var(--font);background:var(--bg);color:var(--white);min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}
/* Subtle radial glow */
body::before{content:'';position:fixed;top:-30%;left:50%;transform:translateX(-50%);width:800px;height:800px;background:radial-gradient(circle,rgba(192,57,43,.08) 0%,transparent 70%);pointer-events:none}

.welcome{text-align:center;max-width:520px;width:100%;padding:24px}

/* Logo */
.logo-wrap{width:100px;height:100px;margin:0 auto 20px;border-radius:50%;border:3px solid var(--red);display:flex;align-items:center;justify-content:center;background:var(--white);overflow:hidden}
.logo-wrap img{width:80%;height:80%;object-fit:contain}
.logo-text{font-family:'Bebas Neue',sans-serif;font-size:.95rem;letter-spacing:3px;color:var(--dim);margin-bottom:8px}

/* Greeting */
.greeting{font-size:2rem;font-weight:800;margin-bottom:4px}
.clock{font-family:'Bebas Neue',sans-serif;font-size:4rem;color:var(--green);line-height:1;margin-bottom:2px}
.date{color:var(--dim);font-size:.9rem;margin-bottom:28px}

/* Status pill */
.status-pill{display:inline-flex;align-items:center;gap:8px;background:rgba(39,174,96,.1);border:1px solid rgba(39,174,96,.25);border-radius:30px;padding:10px 24px;font-weight:700;font-size:.85rem;color:var(--green);margin-bottom:36px}
.status-pill .dot{width:10px;height:10px;border-radius:50%;background:var(--green);animation:pulse-dot 2s infinite}
@keyframes pulse-dot{0%,100%{box-shadow:0 0 0 0 rgba(39,174,96,.4)}50%{box-shadow:0 0 8px 4px rgba(39,174,96,.15)}}

/* Cards */
.cards{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:32px}
.card{background:var(--card);border:2px solid var(--border);border-radius:20px;padding:32px 20px;cursor:pointer;transition:all .25s;text-align:center}
.card:hover{transform:translateY(-2px)}
.card-start{border-color:var(--green);box-shadow:0 0 20px var(--green-glow)}
.card-start:hover{box-shadow:0 0 30px var(--green-glow);border-color:#2ecc71}
.card-quick:hover{border-color:var(--gold)}
.card-icon{font-size:2.5rem;margin-bottom:12px}
.card-title{font-weight:800;font-size:1.1rem;margin-bottom:6px}
.card-desc{color:var(--dim);font-size:.78rem;line-height:1.4}

/* Status checks */
.checks{display:flex;flex-direction:column;gap:8px}
.check{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 16px;font-size:.82rem}
.check .cdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.cdot.ok{background:var(--green)}
.cdot.warn{background:var(--red)}
.cdot.loading{background:var(--orange);animation:blink .8s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
</style>
</head>
<body>

<div class="welcome">
  <!-- Logo -->
  <div class="logo-wrap">
    <img src="../img/logo.png" alt="New Pizza Reims" onerror="this.parentElement.innerHTML='<span style=font-size:2rem>🍕</span>'">
  </div>
  <div class="logo-text">NEW PIZZA REIMS — ADMIN</div>

  <!-- Greeting -->
  <div class="greeting">Bonjour 👋</div>
  <div class="clock" id="clock">--:--</div>
  <div class="date" id="dateStr">--</div>

  <!-- Status -->
  <div class="status-pill"><span class="dot"></span>Restaurant ouvert — Commandes actives</div>

  <!-- Action cards -->
  <div class="cards">
    <div class="card card-start" onclick="startDay()">
      <div class="card-icon">🟢</div>
      <div class="card-title">Démarrer<br>la journée</div>
      <div class="card-desc">Active les commandes<br>+ Son activé</div>
    </div>
    <div class="card card-quick" onclick="quickPass()">
      <div class="card-icon">⚡</div>
      <div class="card-title">Juste de<br>passage</div>
      <div class="card-desc">Consulter sans changer<br>le statut</div>
    </div>
  </div>

  <!-- System checks -->
  <div class="checks">
    <div class="check"><span class="cdot loading" id="qzDot"></span><span id="qzText">Vérification QZ Tray...</span></div>
    <div class="check"><span class="cdot loading" id="fbDot"></span><span id="fbText">Vérification Firebase...</span></div>
  </div>
</div>

<!-- QZ Tray -->
<script src="https://cdn.jsdelivr.net/npm/qz-tray@2/qz-tray.js"></script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
// Clock
function updateClock(){
  var now = new Date();
  document.getElementById('clock').textContent = now.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
  document.getElementById('dateStr').textContent = now.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
}
updateClock();
setInterval(updateClock, 1000);

// Firebase check
firebase.initializeApp({
  apiKey:"AIzaSyBc4KLK4E6p5rEmQBcdghX2YesveHyT2NU",
  authDomain:"pizza-reims.firebaseapp.com",
  projectId:"pizza-reims",
  storageBucket:"pizza-reims.firebasestorage.app",
  messagingSenderId:"39771057202",
  appId:"1:39771057202:web:e55aa7ce61d7d39f82a02b"
});
var db = firebase.firestore();
db.collection('orders').limit(1).get().then(function(){
  document.getElementById('fbDot').className='cdot ok';
  document.getElementById('fbText').textContent='Firebase connecté';
}).catch(function(){
  document.getElementById('fbDot').className='cdot warn';
  document.getElementById('fbText').textContent='Firebase — erreur de connexion';
});

// QZ Tray check
function checkQZ(){
  if(typeof qz !== 'undefined'){
    qz.websocket.connect().then(function(){
      return qz.printers.find();
    }).then(function(printers){
      document.getElementById('qzDot').className='cdot ok';
      document.getElementById('qzText').textContent='Imprimante: ' + (printers[0] || 'aucune');
    }).catch(function(){
      document.getElementById('qzDot').className='cdot warn';
      document.getElementById('qzText').textContent='QZ Tray — non connecté';
    });
  } else {
    document.getElementById('qzDot').className='cdot warn';
    document.getElementById('qzText').textContent='QZ Tray — non installé (qz.io)';
  }
}
setTimeout(checkQZ, 1000);

// Actions
function startDay(){
  var ctx = new (window.AudioContext || window.webkitAudioContext)();
  ctx.resume();
  localStorage.setItem('apk_audio_unlocked', 'true');
  localStorage.setItem('apk_day_started', new Date().toDateString());
  window.location.href = 'orders.html';
}

function quickPass(){
  var ctx = new (window.AudioContext || window.webkitAudioContext)();
  ctx.resume();
  window.location.href = 'orders.html';
}
</script>
</body>
</html>
