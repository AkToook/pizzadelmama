<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Commande confirmée — New Pizza Reims</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--red:#c0392b;--red-bright:#e74c3c;--dark:#0b1120;--dark-surface:#101828;--dark-card:#162032;--dark-border:#1e2d45;--gold:#d4a855;--white:#f5f5f5;--white-dim:#a0a0a0;--green:#27ae60;--font-display:'Bebas Neue',sans-serif;--font-body:'Manrope',sans-serif}
html{background:var(--dark)}
body{font-family:var(--font-body);color:var(--white);background:var(--dark);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.card{background:var(--dark-card);border:1px solid var(--dark-border);border-radius:24px;padding:48px 36px;max-width:480px;width:100%;text-align:center}
.icon{width:80px;height:80px;border-radius:50%;background:var(--green);display:flex;align-items:center;justify-content:center;margin:0 auto 24px;font-size:2.5rem}
.icon.error{background:var(--red)}
.icon.loading{background:var(--gold);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
h1{font-family:var(--font-display);font-size:2rem;margin-bottom:8px}
.ref{color:var(--gold);font-size:.9rem;font-weight:700;margin-bottom:16px}
p{color:var(--white-dim);font-size:.9rem;line-height:1.6;margin-bottom:20px}
.btn{display:inline-block;background:var(--red);color:#fff;padding:14px 36px;border-radius:30px;font-weight:700;font-size:1rem;text-decoration:none;transition:background .25s}
.btn:hover{background:var(--red-bright)}
.contact{margin-top:24px;padding-top:20px;border-top:1px solid var(--dark-border)}
.contact a{color:var(--gold);font-weight:600;text-decoration:none}
</style>
</head>
<body>
<div class="card" id="confirmCard">
<div class="icon loading" id="statusIcon">⏳</div>
<h1 id="statusTitle">Vérification du paiement...</h1>
<div class="ref" id="refDisplay"></div>
<p id="statusMsg">Un instant, nous vérifions votre paiement auprès de Stripe...</p>
<div class="contact" style="display:none" id="contactBlock">
<p style="margin-bottom:8px">Une question sur votre commande ?</p>
<a href="tel:0326043051">📞 03 26 04 30 51</a> · <a href="https://wa.me/33668562273">💬 WhatsApp</a>
</div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey: "AIzaSyBc4KLK4E6p5rEmQBcdghX2YesveHyT2NU",
  authDomain: "pizza-reims.firebaseapp.com",
  projectId: "pizza-reims",
  storageBucket: "pizza-reims.appspot.com",
  messagingSenderId: "123456789",
  appId: "1:123456789:web:abc123"
});
var db = firebase.firestore();

(async function(){
  var params = new URLSearchParams(window.location.search);
  var sessionId = params.get('session_id');

  if(!sessionId){
    showError('Aucune session de paiement trouvée.');
    return;
  }

  try {
    // Vérifier le paiement via l'API Vercel
    var resp = await fetch('/api/verify-payment?session_id=' + encodeURIComponent(sessionId));
    var data = await resp.json();

    if(!resp.ok || data.error){
      showError(data.error || 'Erreur de vérification');
      return;
    }

    if(data.payment_status !== 'paid'){
      showError('Le paiement n\'a pas été validé. Statut: ' + data.payment_status);
      return;
    }

    // Paiement validé — créer la commande dans Firebase
    var meta = data.metadata || {};
    var items = [];
    try { items = JSON.parse(meta.items || '[]'); } catch(e){}

    var orderData = {
      orderNum: meta.orderNum || 'CB-' + Date.now().toString(36).toUpperCase(),
      customerName: meta.customerName || '',
      customerPhone: meta.customerPhone || '',
      deliveryMode: meta.deliveryMode || 'emporter',
      address: meta.address || '',
      special: meta.special || '',
      items: items,
      total: data.amount / 100, // centimes → euros
      status: 'PAYED_CARD',
      payment: 'carte',
      stripeSessionId: sessionId,
      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      printed: false
    };

    await db.collection('orders').add(orderData);

    // Succès
    document.getElementById('statusIcon').textContent = '✓';
    document.getElementById('statusIcon').className = 'icon';
    document.getElementById('statusTitle').textContent = 'Paiement reçu !';
    document.getElementById('refDisplay').textContent = 'Commande #' + orderData.orderNum;
    document.getElementById('statusMsg').innerHTML = 'Votre commande a bien été enregistrée et payée.<br>Notre équipe la prépare dès maintenant.<br><br><a href="/" class="btn">Retour au site</a>';
    document.getElementById('contactBlock').style.display = '';

    // WhatsApp notification
    var whatsappMsg = '🍕 NOUVELLE COMMANDE CARTE 💳\n' +
      'Commande: ' + orderData.orderNum + '\n' +
      'Client: ' + orderData.customerName + '\n' +
      'Tel: ' + orderData.customerPhone + '\n' +
      'Mode: ' + (orderData.deliveryMode === 'livraison' ? 'Livraison' : 'A emporter') + '\n' +
      (orderData.address ? 'Adresse: ' + orderData.address + '\n' : '') +
      'Total: ' + orderData.total.toFixed(2) + ' EUR\n' +
      'Paiement: CARTE ✅';
    fetch('https://api.whatsapp.com/send?phone=33668562273&text=' + encodeURIComponent(whatsappMsg));

  } catch(err){
    console.error(err);
    showError('Erreur: ' + err.message);
  }
})();

function showError(msg){
  document.getElementById('statusIcon').textContent = '✕';
  document.getElementById('statusIcon').className = 'icon error';
  document.getElementById('statusTitle').textContent = 'Paiement échoué';
  document.getElementById('statusMsg').innerHTML = msg + '<br><br><a href="/" class="btn">Réessayer</a>';
  document.getElementById('contactBlock').style.display = '';
}
</script>
</body>
</html>
